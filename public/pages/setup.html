<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإعداد — صالونك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .setup-wrap { max-width: 760px; margin: 0 auto; padding: 3rem 1rem 4rem; }
    .setup-head { text-align: center; margin-bottom: 2rem; }
    .setup-head .logo-preview { font-size: 3rem; }
    .setup-head h1 { font-size: 2rem; margin: 0.4rem 0; }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .swatches { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .swatch.active { border-color: #fff; }
    .section-title { color: var(--brand); font-size: 1.1rem; margin: 1.8rem 0 0.4rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border-color); }
    .hint { color: var(--text-tertiary); font-size: 0.82rem; margin-top: 0.25rem; }
    @media (max-width: 560px) { .field-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="setup-wrap">
    <div class="setup-head">
      <div class="logo-preview" id="logoPreview">✂️</div>
      <h1>إعداد الصالون</h1>
      <p class="text-muted">جهّز صالونك في دقائق — كل هذه القيم يمكن تعديلها لاحقاً</p>
    </div>

    <form id="setupForm" class="card" style="padding:1.75rem;">

      <div class="section-title">🏷️ هوية الصالون</div>
      <div class="field-grid">
        <div class="form-group">
          <label class="form-label">اسم الصالون (بالعربية) *</label>
          <input class="form-input" id="salon_name" required placeholder="مثال: صالون النخبة">
        </div>
        <div class="form-group">
          <label class="form-label">الاسم بالإنجليزية</label>
          <input class="form-input" id="salon_name_en" dir="ltr" placeholder="ELITE SALON">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">الشعار / الوصف القصير</label>
        <input class="form-input" id="tagline" placeholder="أناقتك تبدأ من عندنا">
      </div>
      <div class="field-grid">
        <div class="form-group">
          <label class="form-label">رمز الشعار (إيموجي)</label>
          <input class="form-input" id="logo_emoji" maxlength="4" placeholder="✂️">
        </div>
        <div class="form-group">
          <label class="form-label">العملة</label>
          <input class="form-input" id="currency" placeholder="ج.م">
        </div>
      </div>

      <div class="section-title">🎨 اللون الأساسي</div>
      <div class="flex" style="align-items:center;gap:1rem;flex-wrap:wrap;">
        <input type="color" id="brand_color" value="#c9a84c" style="width:56px;height:44px;border:none;background:none;cursor:pointer;">
        <div class="swatches" id="swatches"></div>
      </div>

      <div class="section-title">📞 التواصل</div>
      <div class="field-grid">
        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input class="form-input" id="phone" dir="ltr" placeholder="01000000000">
        </div>
        <div class="form-group">
          <label class="form-label">واتساب (مع كود الدولة)</label>
          <input class="form-input" id="whatsapp" dir="ltr" placeholder="201000000000">
          <div class="hint">أرقام فقط بكود الدولة — يُستخدم لإشعارات الحجز</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">العنوان</label>
        <input class="form-input" id="address" placeholder="المدينة، الشارع...">
      </div>

      <div class="section-title">🔗 روابط التواصل الاجتماعي</div>
      <div class="field-grid">
        <div class="form-group"><label class="form-label">إنستجرام</label><input class="form-input" id="instagram" dir="ltr" placeholder="https://instagram.com/..."></div>
        <div class="form-group"><label class="form-label">تيك توك</label><input class="form-input" id="tiktok" dir="ltr" placeholder="https://tiktok.com/@..."></div>
      </div>
      <div class="field-grid">
        <div class="form-group"><label class="form-label">فيسبوك</label><input class="form-input" id="facebook" dir="ltr" placeholder="https://facebook.com/..."></div>
        <div class="form-group"><label class="form-label">صورة الغلاف (رابط)</label><input class="form-input" id="hero_image" dir="ltr" placeholder="/uploads/hero.jpg"></div>
      </div>

      <div class="section-title" id="adminSection">🔐 حساب المدير</div>
      <div class="field-grid">
        <div class="form-group">
          <label class="form-label">اسم المستخدم</label>
          <input class="form-input" id="admin_username" dir="ltr" autocomplete="username" placeholder="admin">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور <span id="pwReq">*</span></label>
          <input class="form-input" id="admin_password" type="password" dir="ltr" autocomplete="new-password" placeholder="6 أحرف على الأقل">
          <div class="hint" id="pwHint">اختر كلمة مرور قوية — ستحتاجها لدخول لوحة التحكم</div>
        </div>
      </div>

      <button type="submit" class="btn btn-gold w-full mt-3" id="saveBtn" style="padding:0.9rem;font-size:1.1rem;">حفظ وتشغيل الصالون 🚀</button>
    </form>
  </div>

  <script>
    const PRESETS = ['#c9a84c','#d4af37','#b76e79','#8e44ad','#2c98a0','#e74c3c','#27ae60','#2c3e50','#e91e63','#ff6b35'];
    let alreadyConfigured = false;

    function toast(msg, type='success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      c.appendChild(t); setTimeout(()=>t.classList.add('show'),10);
      setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3200);
    }

    function applyLiveColor(hex) {
      const n = parseInt(hex.replace('#',''),16);
      const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
      const root=document.documentElement.style;
      root.setProperty('--brand',hex);
      root.setProperty('--brand-rgb',`${r}, ${g}, ${b}`);
    }

    const colorInput = document.getElementById('brand_color');
    const swWrap = document.getElementById('swatches');
    PRESETS.forEach(hex => {
      const s = document.createElement('div');
      s.className = 'swatch'; s.style.background = hex; s.title = hex;
      s.onclick = () => { colorInput.value = hex; applyLiveColor(hex); markActive(hex); };
      swWrap.appendChild(s);
    });
    function markActive(hex) {
      swWrap.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.title.toLowerCase() === hex.toLowerCase()));
    }
    colorInput.addEventListener('input', e => { applyLiveColor(e.target.value); markActive(e.target.value); });

    document.getElementById('logo_emoji').addEventListener('input', e => {
      document.getElementById('logoPreview').textContent = e.target.value || '✂️';
    });

    // Prefill from existing settings (re-branding an already-configured salon).
    (async () => {
      try {
        const res = await fetch('/api/settings');
        const s = await res.json();
        alreadyConfigured = s.configured === '1';
        const set = (id,v)=>{ if(v!==undefined&&v!==null) document.getElementById(id).value = v; };
        ['salon_name','salon_name_en','tagline','logo_emoji','currency','phone','whatsapp','address','instagram','tiktok','facebook','hero_image'].forEach(k=>set(k,s[k]));
        if (s.brand_color) { colorInput.value = s.brand_color; applyLiveColor(s.brand_color); markActive(s.brand_color); }
        else markActive('#c9a84c');
        document.getElementById('logoPreview').textContent = s.logo_emoji || '✂️';
        if (alreadyConfigured) {
          // Editing an existing salon: password optional, username prefilled empty (kept server-side).
          document.getElementById('pwReq').textContent = '(اترك فارغاً لعدم التغيير)';
          document.getElementById('pwHint').textContent = 'اتركه فارغاً للإبقاء على كلمة المرور الحالية';
          document.getElementById('admin_password').required = false;
        }
      } catch(_) { markActive('#c9a84c'); }
    })();

    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const val = id => document.getElementById(id).value.trim();
      const settings = {};
      ['salon_name','salon_name_en','tagline','logo_emoji','currency','phone','whatsapp','address','instagram','tiktok','facebook','hero_image'].forEach(k=>settings[k]=val(k));
      settings.brand_color = colorInput.value;
      settings.home_description = settings.tagline;

      const admin_username = val('admin_username');
      const admin_password = val('admin_password');

      if (!settings.salon_name) { toast('يرجى إدخال اسم الصالون','error'); return; }
      if (!alreadyConfigured && (!admin_password || admin_password.length < 6)) {
        toast('اختر كلمة مرور للمدير (6 أحرف على الأقل)','error'); return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'جاري الحفظ...';
      try {
        const res = await fetch('/api/setup', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ settings, admin_username: admin_username || undefined, admin_password: admin_password || undefined })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          toast('تم الحفظ بنجاح! جاري التحويل...','success');
          setTimeout(()=>window.location.href='/admin', 900);
        } else {
          toast(data.error || 'تعذر الحفظ','error');
          btn.disabled = false; btn.textContent = 'حفظ وتشغيل الصالون 🚀';
        }
      } catch(_) {
        toast('حدث خطأ في الاتصال','error');
        btn.disabled = false; btn.textContent = 'حفظ وتشغيل الصالون 🚀';
      }
    });
  </script>
</body>
</html>
