<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض الأعمال — الشرقاوي صالون</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <script src="/js/brand.js"></script>
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-logo">
        <span class="logo-icon">✂️</span>
        الشرقاوي صالون
      </a>
      <div class="navbar-links" id="navLinks">
        <a href="/">الرئيسية</a>
        <a href="/services">خدماتنا</a>
        <a href="/gallery" class="active">معرض الأعمال</a>
        <a href="/book">احجز الآن</a>
      </div>
      <div class="navbar-toggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-container" style="max-width:1000px;">

    <a href="/" class="back-link">→ العودة للرئيسية</a>

    <div class="page-header">
      <h1>معرض <span class="text-gold">الأعمال</span></h1>
      <p>شاهد أحدث أعمالنا وتصميماتنا</p>
    </div>

    <div class="gallery-submit-bar">
      <button class="btn btn-outline" onclick="openSubmit()">📷 شارك صورتك</button>
    </div>

    <div id="galleryContent">
      <div class="flex-center">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

  <!-- Customer photo submission modal -->
  <div class="modal-overlay hidden" id="submitModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>شارك صورتك</h3>
        <button class="btn btn-icon" onclick="closeSubmit()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="text-muted" style="margin-top:0;font-size:0.9rem;">ستتم مراجعة الصورة قبل نشرها في المعرض.</p>
        <form id="submitForm">
          <div class="form-group">
            <label class="form-label">اسمك (اختياري)</label>
            <input class="form-input" id="sub-name" maxlength="60" placeholder="اسمك">
          </div>
          <div class="form-group">
            <label class="form-label">تعليق (اختياري)</label>
            <input class="form-input" id="sub-desc" maxlength="200" placeholder="مثال: قصة شعر جديدة">
          </div>
          <div class="form-group">
            <label class="form-label">الصورة</label>
            <input class="form-input" id="sub-file" type="file" accept="image/*" required>
          </div>
          <button type="submit" class="btn btn-gold w-full" id="sub-btn">إرسال للمراجعة</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-close" onclick="closeLightbox(event)">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 <span class="footer-brand">الشرقاوي صالون</span> — جميع الحقوق محفوظة</p>
  </footer>

  <script src="/js/gallery.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
    function toggleNav() {
      document.getElementById('navLinks').classList.toggle('open');
    }
  </script>

</body>
</html>
