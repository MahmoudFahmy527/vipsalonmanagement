<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإحصائيات — صالونك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/brand.js"></script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="الإدارة">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0b">
  <style>
    .chart { display:flex; align-items:flex-end; gap:0.35rem; height:160px; padding-top:1rem; }
    .chart-bar { flex:1 1 0; min-width:0; display:flex; flex-direction:column; align-items:center; gap:0.3rem; height:100%; justify-content:flex-end; }
    .chart-bar .bar { width:100%; min-height:3px; border-radius:5px 5px 0 0; background:linear-gradient(var(--brand-light),var(--brand)); transition:height .4s var(--ease); }
    .chart-bar .lbl { font-size:0.65rem; color:var(--text-tertiary); white-space:nowrap; }
    .chart-bar .val { font-size:0.7rem; color:var(--text-secondary); }
    @media (max-width:560px){
      .chart { gap:0.15rem; }
      .chart-bar .val { display:none; }
      .chart-bar .lbl { font-size:0.6rem; }
      .chart-bar .lbl .d { display:none; }   /* show just the day number on phones */
    }
    .rank-row { display:flex; align-items:center; justify-content:space-between; padding:0.55rem 0; border-bottom:1px solid var(--border-color); }
    .rank-row:last-child { border-bottom:none; }
    .rank-bar { height:8px; border-radius:999px; background:var(--brand); }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container flex-between">
      <div class="flex" style="align-items:center;gap:0.75rem;">
        <span class="logo-icon" style="font-size:1.5rem;">✂</span>
        <span style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);" data-brand-name>صالونك</span>
      </div>
      <div class="flex" style="gap:0.5rem;align-items:center;flex-wrap:wrap;">
        <a href="/admin" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">الحجوزات</a>
        <a href="/admin/stats" class="admin-nav-item" style="color:var(--gold);font-weight:700;text-decoration:none;">الإحصائيات</a>
        <a href="/admin/gallery" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">المعرض</a>
        <a href="/admin/services" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">الخدمات</a>
        <a href="/admin/barbers" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">الحلاقين</a>
        <a href="/admin/reviews" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">التقييمات</a>
        <a href="/admin/settings" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">الإعدادات</a>
        <a href="/admin/qr" class="admin-nav-item" style="color:var(--text-secondary);text-decoration:none;">رمز QR</a>
        <button class="btn btn-outline btn-sm" id="logout-btn" style="margin-right:0.5rem;">تسجيل الخروج</button>
      </div>
    </div>
  </nav>

  <div class="page-container">
    <div class="container">
      <h2 style="margin-bottom:1.25rem;">الإحصائيات</h2>

      <div id="stats-content">
        <div class="flex-center mt-3"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="/js/admin-stats.js"></script>
</body>
</html>
