    <meta property="og:title" content="الشرقاوي صالون | Elsharkawy Salon">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --gold-dark: #a08030;
            --bg-primary: #0a0a0a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --text-primary: #f5f0e8;
            --text-secondary: #a09882;
            --border: rgba(201, 168, 76, 0.15);
            --border-hover: rgba(201, 168, 76, 0.4);
            --shadow-gold: 0 0 40px rgba(201, 168, 76, 0.08);
            --shadow-gold-hover: 0 0 60px rgba(201, 168, 76, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 168, 76, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(201, 168, 76, 0.02) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 40px 24px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top decorative line */
        .top-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        /* Logo / Avatar area */
        .logo-wrapper {
            position: relative;
            margin-bottom: 32px;
            animation: fadeInScale 1s ease-out 0.2s both;
        }

        .logo-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.05), rgba(10, 10, 10, 0.9));
            box-shadow: var(--shadow-gold), inset 0 0 30px rgba(201, 168, 76, 0.05);
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 1px solid rgba(201, 168, 76, 0.1);
            animation: ringPulse 3s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        .logo-icon {
            font-size: 48px;
            line-height: 1;
        }

        /* Salon name */
        .salon-name {
            text-align: center;
            margin-bottom: 8px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .salon-name h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 1px;
            line-height: 1.3;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--gold-light) 50%, var(--text-primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .salon-name-en {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 700;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        /* Tagline */
        .tagline {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 40px;
            font-weight: 400;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 280px;
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
        }

        .divider-icon {
            color: var(--gold);
            font-size: 0.7rem;
        }

        /* Social links */
        .social-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 48px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(201, 168, 76, 0.03));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .social-link:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-gold-hover);
            transform: translateY(-2px);
        }

        .social-link:hover::before {
            opacity: 1;
        }

        .social-link:active {
            transform: translateY(0) scale(0.98);
        }

        .social-link:nth-child(1) { animation: fadeInUp 0.8s ease-out 0.8s both; }
        .social-link:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.95s both; }
        .social-link:nth-child(3) { animation: fadeInUp 0.8s ease-out 1.1s both; }

        .social-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .social-icon svg {
            width: 26px;
            height: 26px;
        }

        .social-icon.instagram {
            background: linear-gradient(135deg, #833AB4, #FD1D1D, #F77737);
        }

        .social-icon.tiktok {
            background: linear-gradient(135deg, #010101, #25F4EE);
        }

        .social-icon.facebook {
            background: linear-gradient(135deg, #1877F2, #4599FF);
        }

        .social-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .social-platform {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .social-handle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            direction: ltr;
            text-align: right;
        }

        .social-arrow {
            color: var(--gold);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .social-link:hover .social-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* QR Section */
        .qr-section {
            text-align: center;
            animation: fadeInUp 1s ease-out 1.3s both;
            width: 100%;
        }

        .qr-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .qr-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 28px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-gold), 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .qr-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 21px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--gold));
            z-index: -1;
        }

        #qrcode {
            width: 200px;
            height: 200px;
        }

        #qrcode canvas {
            width: 200px !important;
            height: 200px !important;
            border-radius: 8px;
        }

        .qr-brand {
            font-family: 'Cairo', sans-serif;
            font-size: 0.75rem;
            color: #333;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .qr-download {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }

        .qr-download button {
            padding: 10px 24px;
            border: 1px solid var(--border-hover);
            background: transparent;
            color: var(--gold);
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qr-download button:hover {
            background: rgba(201, 168, 76, 0.1);
            border-color: var(--gold);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 48px;
            text-align: center;
            animation: fadeInUp 1s ease-out 1.5s both;
        }

        .footer-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 16px;
        }

        .footer p {
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Mobile optimizations */
        @media (max-width: 400px) {
            .container {
                padding: 32px 16px 48px;
            }

            .salon-name h1 {
                font-size: 1.8rem;
            }

            .social-link {
                padding: 14px 18px;
            }

            .social-icon {
                width: 42px;
                height: 42px;
                border-radius: 10px;
            }

            .social-icon svg {
                width: 22px;
                height: 22px;
            }
        }

        /* Print styles for QR */
        @media print {
            body {
                background: white;
            }
            .social-links, .footer, .bg-pattern, .particles, .tagline, .divider {
                display: none !important;
            }
            .container {
                padding: 20px;
            }
            .qr-card {
                box-shadow: none;
                border: 2px solid #ccc;
            }
        }
    </style>
</head>

    <script>
        // =========================================
        // Floating Particles
        // =========================================
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 20;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (8 + Math.random() * 12) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = (1 + Math.random() * 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        createParticles();

        // =========================================
        // QR Code Generation
        // =========================================
        // The QR code encodes this page's own URL so it is self-referencing.
        // When hosted, scanning the QR code opens this very page.
        // While local, it falls back to a placeholder URL you can update.
        function generateQR() {
            const pageUrl = window.location.href.startsWith('file')
                ? 'https://elsharkawy-salon.github.io'   // ← Replace with your real hosted URL
                : window.location.href;

            const qr = qrcode(0, 'M');
            qr.addData(pageUrl);
            qr.make();

            const moduleCount = qr.getModuleCount();
            const cellSize = 8;
            const margin = cellSize * 2;
            const size = moduleCount * cellSize + margin * 2;

            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);

            // Draw modules with rounded corners
            ctx.fillStyle = '#1a1a1a';
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        const x = margin + col * cellSize;
                        const y = margin + row * cellSize;
                        const r = cellSize * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(x + r, y);
                        ctx.lineTo(x + cellSize - r, y);
                        ctx.quadraticCurveTo(x + cellSize, y, x + cellSize, y + r);
                        ctx.lineTo(x + cellSize, y + cellSize - r);
                        ctx.quadraticCurveTo(x + cellSize, y + cellSize, x + cellSize - r, y + cellSize);
                        ctx.lineTo(x + r, y + cellSize);
                        ctx.quadraticCurveTo(x, y + cellSize, x, y + cellSize - r);
                        ctx.lineTo(x, y + r);
                        ctx.quadraticCurveTo(x, y, x + r, y);
                        ctx.fill();
                    }
                }
            }

            // Style the finder patterns with gold
            function drawFinderPattern(startRow, startCol) {
                // Clear the area first
                const fx = margin + startCol * cellSize;
                const fy = margin + startRow * cellSize;
                const fSize = 7 * cellSize;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(fx, fy, fSize, fSize);

                // Outer ring
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath();
                roundRect(ctx, fx, fy, fSize, fSize, cellSize * 0.4);
                ctx.fill();

                // White gap
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                roundRect(ctx, fx + cellSize, fy + cellSize, 5 * cellSize, 5 * cellSize, cellSize * 0.3);
                ctx.fill();

                // Inner square
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath();
                roundRect(ctx, fx + 2 * cellSize, fy + 2 * cellSize, 3 * cellSize, 3 * cellSize, cellSize * 0.3);
                ctx.fill();
            }

            function roundRect(ctx, x, y, w, h, r) {
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
            }

            drawFinderPattern(0, 0);
            drawFinderPattern(0, moduleCount - 7);
            drawFinderPattern(moduleCount - 7, 0);

            // Put canvas in container
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            canvas.style.width = '200px';
            canvas.style.height = '200px';
            canvas.style.borderRadius = '8px';
            container.appendChild(canvas);

            // Also create an SVG version for download
            window._qrSVG = generateSVG(qr, moduleCount, cellSize, margin, size);
        }

        function generateSVG(qr, moduleCount, cellSize, margin, size) {
            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">`;
            svg += `<rect width="${size}" height="${size}" fill="#ffffff"/>`;

            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        const x = margin + col * cellSize;
                        const y = margin + row * cellSize;
                        // Skip finder pattern areas
                        const inFinder =
                            (row < 7 && col < 7) ||
                            (row < 7 && col >= moduleCount - 7) ||
                            (row >= moduleCount - 7 && col < 7);
                        const color = inFinder ? '#c9a84c' : '#1a1a1a';
                        svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="${cellSize * 0.15}" fill="${color}"/>`;
                    }
                }
            }
            svg += '</svg>';
            return svg;
        }

        // =========================================
        // Download QR Code
        // =========================================
        function downloadQR(format) {
            if (format === 'png') {
                const canvas = document.querySelector('#qrcode canvas');
                if (!canvas) return;

                // Create a high-res version
                const hiRes = document.createElement('canvas');
                const scale = 4;
                hiRes.width = canvas.width * scale;
                hiRes.height = canvas.height * scale;
                const ctx = hiRes.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(canvas, 0, 0, hiRes.width, hiRes.height);

                const link = document.createElement('a');
                link.download = 'elsharkawy-salon-qr.png';
                link.href = hiRes.toDataURL('image/png');
                link.click();
            } else if (format === 'svg') {
                if (!window._qrSVG) return;
                const blob = new Blob([window._qrSVG], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'elsharkawy-salon-qr.svg';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }
        }

        // Generate QR on load
        window.addEventListener('DOMContentLoaded', generateQR);

        // If the library is loaded after DOM ready
        if (typeof qrcode !== 'undefined') {
            generateQR();
        }
    </script>
</body>
</html>
